name: Build My EXE

on:
  workflow_dispatch: # 允许手动点击按钮开始打包

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # 这里的库要和你代码里 import 的保持一致
        pip install pyaudio numpy pyttsx3 pyinstaller

    - name: Run PyInstaller
      run: |
        # 这里的 noise_monitor.py 记得换成你上传的实际文件名
        pyinstaller --noconsole --onefile noise_monitor.py

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
      name: MyExecutableProgram
      path: dist/*.exe
