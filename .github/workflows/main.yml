name: Build EXE for Windows

on:
  push:
    branches: [ "main" ] # 当你提交代码到主分支时触发

jobs:
  build:
    runs-on: windows-latest # 使用 GitHub 提供的 Windows 最新环境

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pyqtgraph numpy sounddevice pyttsx3 pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name "教室声音助手" monitor.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Classroom-Monitor-EXE
        path: dist/教室声音助手.exe
